<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OneXP GEO Audit Tool — IfThen</title>
  <link rel="preload" href="assets/fonts/Sohne-Buch.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ═══════════════════════════════════════════════════════════════════════ -->
  <!-- STATE 1: Welcome Screen                                                 -->
  <!-- ═══════════════════════════════════════════════════════════════════════ -->
  <div id="welcome-screen" class="view">
    <div class="welcome-card">

      <div class="welcome-header">
        <img src="assets/logo.svg" alt="IfThen" class="welcome-logo">
      </div>

      <h1 class="welcome-title">OneXP GEO Audit</h1>
      <p class="welcome-subtitle">
        Audit a OneXP page against SEO and GEO best practices.
      </p>

      <!-- Page Name input -->
      <div class="form-group">
        <label for="page-name">Page Name</label>
        <input
          type="text"
          id="page-name"
          placeholder="e.g., Coca‑Cola Zero Sugar Products"
          autocomplete="off"
        >
      </div>

      <!-- Page URL input -->
      <div class="form-group">
        <label for="page-url">Page URL</label>
        <input
          type="url"
          id="page-url"
          placeholder="e.g., https://www.coca-cola.com/us/en/brands/..."
          autocomplete="off"
        >
      </div>

      <!-- Page Type selector — rendered as styled cards by script.js -->
      <fieldset class="form-group page-type-fieldset">
        <legend>What type of page are you auditing?</legend>
        <div class="page-type-options" id="page-type-options">
          <!-- JS renders a <label class="page-type-card"> for each page type -->
        </div>
      </fieldset>

      <!-- PLP sub-type follow-up question — animated in/out by script.js -->
      <div id="plp-subtype-question" class="plp-subtype-question" aria-hidden="true">
        <fieldset class="form-group page-type-fieldset">
          <legend>Which best describes your Product Landing Page (PLP)?</legend>
          <div class="page-type-options" id="plp-subtype-options">
            <!-- JS renders sub-type option cards -->
          </div>
        </fieldset>
      </div>

      <!-- Begin button — disabled until all three inputs are filled -->
      <button id="begin-audit-btn" class="btn btn-primary" disabled>
        Begin Audit
      </button>

    </div>
  </div>


  <!-- ═══════════════════════════════════════════════════════════════════════ -->
  <!-- STATE 2: Audit Flow                                                     -->
  <!-- ═══════════════════════════════════════════════════════════════════════ -->
  <div id="audit-flow" class="view hidden">

    <!-- Skip to main content (accessibility) -->
    <a href="#audit-content" class="skip-link">Skip to main content</a>

    <!-- HEADER -->
    <header class="audit-header" id="audit-header">
      <div class="header-content">
        <span class="header-tool-label">OneXP GEO Audit</span>
        <div class="header-center">
          <h1 class="header-page-name" id="header-page-name"><!-- JS fills --></h1>
          <a
            class="header-page-url ext-link"
            id="header-page-url"
            href="#"
            target="_blank"
            rel="noopener noreferrer"
          ><!-- JS fills --></a>
        </div>
        <img src="assets/logo.svg" alt="IfThen" class="header-logo">
      </div>
      <div
        class="progress-bar-track"
        role="progressbar"
        aria-valuenow="0"
        aria-valuemin="0"
        aria-valuemax="100"
        aria-label="Audit progress"
        id="progress-bar-track"
      >
        <div class="progress-bar-fill" id="progress-bar-fill"></div>
      </div>
    </header>

    <!-- THREE-COLUMN LAYOUT -->
    <div class="audit-layout">

      <!-- LEFT COLUMN: Audit Outline (desktop only) -->
      <nav class="audit-outline" id="audit-outline" aria-label="Audit sections">
        <!-- JS renders a <ul> of section buttons with completion indicators -->
      </nav>

      <!-- CENTER COLUMN: Section Content -->
      <main class="audit-content" id="audit-content" tabindex="-1">
        <!-- JS renders: part label, section heading (<h2>), body copy -->
      </main>

      <!-- RIGHT COLUMN: Checklist -->
      <aside class="audit-checklist" id="audit-checklist" aria-label="Section checklist">
        <!-- JS renders: "Checklist" <h3> + checkbox list, or Part 3 info panel -->
      </aside>

    </div>

    <!-- NAVIGATION BUTTONS -->
    <div class="audit-nav" id="audit-nav">
      <button id="btn-prev" class="btn btn-ghost">&#8592; Previous Section</button>
      <button id="btn-next" class="btn btn-ghost">Next Section &#8594;</button>
    </div>

    <!-- EXPORT AREA — superseded by summary screen; kept for legacy wiring -->
    <div class="export-area hidden" id="export-area">
      <p class="export-message">You've completed the audit. Export your results as a PDF report.</p>
      <button id="btn-export" class="btn btn-primary">Export Audit Report</button>
    </div>

    <!-- SUMMARY SCREEN — shown after completing all audit sections -->
    <div id="summary-screen" class="summary-screen hidden">
      <div class="summary-inner">

        <!-- Overall Score -->
        <div class="summary-score-hero" id="summary-score-hero">
          <!-- JS renders: score circle, label, points -->
        </div>

        <!-- Per-Section Breakdown -->
        <div class="summary-sections" id="summary-sections">
          <h2 class="summary-section-title">Score Breakdown</h2>
          <!-- JS renders: section score rows with bars -->
        </div>

        <!-- Section Notes — hidden when the user hasn't entered any notes -->
        <div class="summary-notes hidden" id="summary-notes">
          <!-- JS renders: "Notes" heading + per-section note blocks -->
        </div>

        <!-- Prioritized Fix List -->
        <div class="summary-fixes" id="summary-fixes">
          <!-- JS renders: grouped unchecked items by tier -->
        </div>

        <!-- Export -->
        <div class="summary-export">
          <button id="btn-summary-export" class="btn btn-primary">Export Audit Report</button>
        </div>

      </div>
    </div>

  </div><!-- /#audit-flow -->


  <!-- PDF print view — hidden on screen, shown only via @media print -->
  <div id="pdf-view" aria-hidden="true"></div>

  <!-- Scripts — load order is critical -->
  <script src="content.js"></script>
  <script src="script.js"></script>

</body>
</html>
